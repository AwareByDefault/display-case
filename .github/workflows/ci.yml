name: CI

# Backstop for the husky git hooks (which are bypassable / absent on bot &
# GitHub-web edits). Runs the same browser-free gate as `.husky/pre-commit` plus
# the e2e suite from `.husky/pre-push`, on every open pull request.
# See contributing/linting-best-practices.md and contributing/testing-best-practices.md.
on:
  pull_request:
  workflow_dispatch:

# A new push to a PR cancels any in-flight run for that ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # `lint` (not `lint:fix`) is the verification form — CI must fail on
      # unformatted/unlinted code rather than silently fixing it.
      - run: bun run lint
      - run: bun run typecheck

  check:
    name: Static checks (structure + tokens + ssr)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # The Playwright browser + its OS deps (the e2e suite launches Chromium).
      - run: bunx playwright install --with-deps chromium
      - run: bun run e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # The render-backed gating checks, scoped to the components this PR could have
  # affected (`--changed` → src/core/affected.ts). A PR that touches no render
  # input checks nothing and exits fast; a global-style/pipeline change checks
  # everything. `fetch-depth: 0` + the base sha give `git diff` a resolvable
  # merge-base; on workflow_dispatch (no PR) the ref falls back to origin/main.
  a11y:
    name: A11y (changed components)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun src/cli.ts check . --a11y --changed
        env:
          DISPLAY_CASE_BASE_REF: ${{ github.event.pull_request.base.sha || 'origin/main' }}
      - name: Upload a11y report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: .display-case/a11y/last-check.json
          retention-days: 7
          if-no-files-found: ignore

  visual:
    name: Visual regression (changed components)
    runs-on: ubuntu-latest
    # Render inside the SAME Playwright image the committed baselines were
    # recorded in (scripts/record-baselines.ts), so pixel diffs reflect real
    # changes, not macOS↔Linux font rendering. Keep this tag, the baseline
    # image, and the `playwright` version in bun.lock in lockstep.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The repo is checked out as a different owner than the container user;
      # let git diff (used by --changed) read it.
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      # The Playwright image doesn't ship `unzip`, which setup-bun needs to
      # extract the Bun release it downloads. Install it before that step.
      - run: apt-get update && apt-get install -y unzip
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # No `playwright install` — the image ships the matching browsers.
      - run: bun src/cli.ts check . --visual --changed
        env:
          DISPLAY_CASE_BASE_REF: ${{ github.event.pull_request.base.sha || 'origin/main' }}
      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: test/visual-baselines/**/*.diff.png
          retention-days: 7
          if-no-files-found: ignore
